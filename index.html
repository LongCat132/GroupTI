<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GroupTI - 小组作业人格测试</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a1a2e;
      --accent: #e94560;
      --bg: #0f0f1a;
      --card-bg: #16162a;
      --text: #ffffff;
      --text-muted: #a0a0b0;
      --border: #2a2a4a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      background-image: 
        radial-gradient(ellipse at 20% 0%, rgba(233, 69, 96, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(26, 26, 46, 0.8) 0%, transparent 50%);
    }

    .container {
      width: 100%;
      max-width: 600px;
      margin-top: 40px;
    }

    .page {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome {
      text-align: center;
      padding: 40px 20px;
    }

    .logo {
      font-size: 80px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 20px;
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .intro {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
      text-align: left;
      border: 1px solid var(--border);
    }

    .intro h3 {
      margin-bottom: 12px;
      color: var(--accent);
    }

    .intro p {
      line-height: 1.8;
      color: var(--text-muted);
    }

    .btn {
      background: var(--accent);
      color: var(--text);
      border: none;
      padding: 16px 48px;
      font-size: 18px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
    }

    .role-btn {
      display: block;
      width: 100%;
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .role-btn:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .role-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 10px;
    }

    .role-text {
      font-size: 20px;
      font-weight: 500;
      display: block;
      margin-bottom: 6px;
      color: var(--text);
    }

    .role-desc {
      color: var(--text);
      font-size: 14px;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .progress-text {
      font-size: 14px;
      color: var(--text-muted);
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin-left: 16px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .question-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 30px;
      border: 1px solid var(--border);
    }

    .question-number {
      color: var(--accent);
      font-size: 14px;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      text-align: left;
      cursor: pointer;
      transition: all 0.3s ease;
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .result {
      text-align: center;
      padding: 20px;
    }

    .result-badge {
      display: inline-block;
      background: var(--accent);
      color: var(--text);
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .result-type {
      font-size: 64px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--accent);
    }

    .result-title {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .result-subtitle {
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .dimensions {
      margin-bottom: 24px;
    }

    .dimension-items {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .dimension-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .dimension-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dimension-item:hover {
      border-color: var(--accent);
    }

    .dimension-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .dimension-value {
      font-size: 18px;
      font-weight: 500;
      color: var(--accent);
    }

    .dimension-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .result-description {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      text-align: left;
    }

    .result-tagline {
      font-size: 20px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .result-desc {
      line-height: 1.8;
      color: var(--text-muted);
    }

    .scene-card {
      background: linear-gradient(135deg, rgba(233, 69, 96, 0.1), rgba(26, 26, 46, 0.5));
      border: 1px solid var(--accent);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      text-align: left;
    }

    .scene-title {
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .result-suggestion {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .share-section {
      margin-bottom: 20px;
    }

    .share-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 14px;
      margin: 0 6px;
      transition: all 0.3s ease;
    }

    .share-btn:hover {
      border-color: var(--accent);
    }

    .restart-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 12px 24px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 14px;
      margin: 0 6px;
      transition: all 0.3s ease;
    }

    .restart-btn:hover {
      border-color: var(--text-muted);
    }

    .match-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      margin-top: 20px;
      border: 1px solid var(--border);
      text-align: left;
    }

    .match-title {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .match-hint {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .match-input-wrapper {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .match-input {
      flex: 1;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 16px;
      text-transform: uppercase;
    }

    .match-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .match-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }

    .match-result {
      padding: 16px;
      border-radius: 12px;
      display: none;
    }

    .match-result.show {
      display: block;
    }

    .match-score {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .match-label {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .match-comment {
      font-size: 16px;
      line-height: 1.6;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 30px;
      max-width: 90%;
      max-height: 80%;
      overflow-y: auto;
      position: relative;
      border: 1px solid var(--border);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
    }

    .modal-title {
      font-size: 20px;
      margin-bottom: 16px;
      color: var(--accent);
    }

    .modal-text {
      line-height: 1.8;
      color: var(--text-muted);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 16px;
    }

    .gallery-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 12px;
    }

    .gallery-item:hover {
      border-color: var(--accent);
    }

    .gallery-item.current {
      border-color: var(--accent);
      background: rgba(233, 69, 96, 0.1);
    }

    @media (max-width: 480px) {
      .title { font-size: 36px; }
      .dimension-items { grid-template-columns: 1fr; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Welcome Page -->
    <div class="page active" id="welcome">
      <div class="welcome">
        <div class="logo">📚</div>
        <h1 class="title">GroupTI</h1>
        <p class="subtitle">小组作业人格测试</p>
        <div class="intro">
          <h3>什么是 GroupTI？</h3>
          <p>你是否曾在小组作业中遇到过「已读不回」的组员？或者自己就是那个一个人扛下所有的冤种组长？GroupTI将帮你解锁专属人格类型——从「催命DDL阎罗王」到「死线隐身术大宗师」，总有一款适合你。</p>
        </div>
        <button class="btn" id="testBtn">开始测试</button>
      </div>
    </div>

    <!-- Role Selection -->
    <div class="page" id="role">
      <div class="welcome">
        <div class="logo">🤔</div>
        <h1 class="title">选择你的角色</h1>
        <p class="subtitle">你在小组作业中通常担任？</p>
        <div class="intro" style="text-align: center;">
          <button class="role-btn" id="btnLeader">
            <span class="role-icon">👑</span>
            <span class="role-text">组长 / 负责人</span>
            <span class="role-desc">主导分工、统筹进度、催作业</span>
          </button>
          <button class="role-btn" id="btnMember">
            <span class="role-icon">👤</span>
            <span class="role-text">组员 / 执行者</span>
            <span class="role-desc">接受任务、完成分配、听安排</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Quiz Page -->
    <div class="page" id="quiz">
      <div class="quiz-header">
        <span class="progress-text" id="progressText">1/10</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 10%"></div>
        </div>
      </div>
      <div class="question-card">
        <div class="question-number" id="questionNumber">问题 1</div>
        <div class="question-text" id="questionText"></div>
        <div class="options" id="options"></div>
      </div>
    </div>

    <!-- Result Page -->
    <div class="page" id="result">
      <div class="result">
        <div class="result-badge" id="resultBadge"></div>
        <div class="result-type" id="resultType"></div>
        <h2 class="result-title" id="resultTitle"></h2>
        <p class="result-subtitle" id="resultSubtitle"></p>
        
        <div class="dimensions">
          <p class="dimension-hint">点击卡片查看详细解释</p>
          <div class="dimension-items">
            <div class="dimension-item" onclick="showDimensionModal(1)">
              <div class="dimension-label">时间态度</div>
              <div class="dimension-value" id="dim1"></div>
            </div>
            <div class="dimension-item" onclick="showDimensionModal(2)">
              <div class="dimension-label">沟通方式</div>
              <div class="dimension-value" id="dim2"></div>
            </div>
            <div class="dimension-item" onclick="showDimensionModal(3)">
              <div class="dimension-label">决策风格</div>
              <div class="dimension-value" id="dim3"></div>
            </div>
            <div class="dimension-item" onclick="showDimensionModal(4)">
              <div class="dimension-label">执行偏好</div>
              <div class="dimension-value" id="dim4"></div>
            </div>
          </div>
        </div>

        <div class="result-description">
          <p class="result-tagline" id="resultTagline"></p>
          <p id="resultDesc"></p>
        </div>

        <div class="scene-card">
          <div class="scene-title">名场面</div>
          <p id="resultScene"></p>
        </div>

        <p class="result-suggestion" id="resultSuggestion"></p>

        <div class="share-section">
          <button class="share-btn" onclick="shareResult()">分享结果</button>
          <button class="share-btn" onclick="showGallery()">人格图鉴</button>
          <br>
          <button class="restart-btn" onclick="restartQuiz()">再做一次</button>
        </div>

        <div class="match-section" id="matchSection">
          <h3 class="match-title">匹配查询</h3>
          <p class="match-hint" id="matchHint"></p>
          <div class="match-input-wrapper">
            <input type="text" id="matchInput" class="match-input" placeholder="输入对方的人格类型（如CVRI）" maxlength="4">
            <button class="match-btn" onclick="calculateMatch()">查询</button>
          </div>
          <div class="match-result" id="matchResult"></div>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
      <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <h3 class="modal-title" id="modalTitle"></h3>
        <p class="modal-text" id="modalText"></p>
      </div>
    </div>
  </div>

<script>
  let userRole = '';
  
  const baseQuestions = [
    {
      text: "离展示还有3天，组内进度50%，你会？",
      options: [
        { letter: 'C', text: "连夜制定计划，按小时推进" },
        { letter: 'D', text: "还有时间，不急" },
        { letter: 'E', text: "先在群里活跃气氛再说" }
      ]
    },
    {
      text: "你的part被打回重做3次，你会？",
      options: [
        { letter: 'G', text: "深夜痛哭但默默修改到v4.0" },
        { letter: 'D', text: "要不这部分找别人吧，我真的不行" },
        { letter: 'I', text: "我觉得我的版本更有艺术性" }
      ]
    },
    {
      text: "小组讨论时，你通常的角色是？",
      options: [
        { letter: 'C', text: "记录员+计时员+会后发会议纪要" },
        { letter: 'V', text: "疯狂输出想法，根本停不下来" },
        { letter: 'S', text: "开着摄像头但静音刷微博" }
      ]
    },
    {
      text: "看到组员发「收到」但24小时没动静，你会？",
      options: [
        { letter: 'V', text: "连环@+私聊+打电话" },
        { letter: 'G', text: "算了，这部分我自己来吧" },
        { letter: 'E', text: "截图发朋友圈：「小组作业受害者+1」" }
      ]
    },
    {
      text: "分配任务时，你倾向于？",
      options: [
        { letter: 'R', text: "按能力分工，明确责任到人" },
        { letter: 'E', text: "先问问大家想做哪个部分" },
        { letter: 'I', text: "先提出一个酷炫的概念" }
      ]
    },
    {
      text: "面对分歧时，你通常？",
      options: [
        { letter: 'R', text: "用数据和事实说服对方" },
        { letter: 'E', text: "大家开心就好，我都可以" },
        { letter: 'C', text: "按我说的做，结果我来负责" }
      ]
    },
    {
      text: "当有人说「这个我不会」时，你会？",
      options: [
        { letter: 'G', text: "好吧那我来做" },
        { letter: 'V', text: "发教程链接+语音讲解直到学会" },
        { letter: 'D', text: "那先跳过这部分吧" }
      ]
    },
    {
      text: "小组作业截止前24小时，你在？",
      options: [
        { letter: 'D', text: "才刚开始做，但很淡定" },
        { letter: 'G', text: "已经在整合最终版了" },
        { letter: 'I', text: "在准备presentation的100种开场" }
      ]
    },
    {
      text: "完成作业后，你会？",
      options: [
        { letter: 'C', text: "检查三遍格式、标点、参考文献" },
        { letter: 'R', text: "只要内容OK就行，格式浮云" },
        { letter: 'E', text: "先发朋友圈庆祝，作业再说" }
      ]
    },
    {
      text: "收到群里99+消息，你会？",
      options: [
        { letter: 'V', text: "爬楼全部看完并回复" },
        { letter: 'S', text: "只看@自己的消息" },
        { letter: 'D', text: "假装没看见，反正有人总结" }
      ]
    }
  ];

  const leaderQuestions = [
    {
      text: "刚被选为组长，你的第一反应是？",
      options: [
        { letter: 'C', text: "立刻建群、拟公告、制定分工表" },
        { letter: 'D', text: "内心崩溃，表面淡定" },
        { letter: 'E', text: "有点紧张但还是接下任务" }
      ]
    },
    {
      text: "组员说「不想做」时，你会？",
      options: [
        { letter: 'C', text: "威严施压，必须做" },
        { letter: 'V', text: "苦口婆心劝导1小时" },
        { letter: 'G', text: "好的，那我来做" }
      ]
    },
    {
      text: "看到组员进度慢，你会？",
      options: [
        { letter: 'V', text: "疯狂@催进度" },
        { letter: 'D', text: "内心着急但不说" },
        { letter: 'I', text: "想个新方案让他们有兴趣" }
      ]
    },
    {
      text: "展示前一周，你会？",
      options: [
        { letter: 'C', text: "制定详细计划，每天检查" },
        { letter: 'D', text: "还有一周，不急" },
        { letter: 'R', text: "等大家做完再整合" }
      ]
    },
    {
      text: "组员做出了成果，你会？",
      options: [
        { letter: 'C', text: "检查三遍，找出问题" },
        { letter: 'E', text: "疯狂夸赞，真棒！" },
        { letter: 'I', text: "问有没有创新点" }
      ]
    }
  ];

  const memberQuestions = [
    {
      text: "被分配到不想做的部分，你会？",
      options: [
        { letter: 'G', text: "硬着头皮做" },
        { letter: 'E', text: "问能不能换" },
        { letter: 'I', text: "把它改成我想做的样子" }
      ]
    },
    {
      text: "组长催进度时，你会？",

  function showQuestion() {

    document.getElementById('questionText').textContent = q.text;
    
    const optionsContainer = document.getElementById('options');
    optionsContainer.innerHTML = '';
    
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt.text;

    });

  function calculateType() {
    const dim1Scores = { C: 0, D: 0 };
    const dim2Scores = { V: 0, S: 0 };
    const dim3Scores = { R: 0, E: 0 };
    const dim4Scores = { I: 0, G: 0 };
    
    const dim1Letters = ['C', 'D', 'S'];
    const dim2Letters = ['V', 'S', 'E'];
    const dim3Letters = ['R', 'E', 'C'];
    const dim4Letters = ['I', 'G', 'D'];
    
    answers.forEach((ans, i) => {
      if (i < 10) {
        if (dim1Letters.includes(ans)) {
          if (ans === 'C') dim1Scores.C++;
          else if (ans === 'D') dim1Scores.D++;
          else dim1Scores.C++;
        }
        if (dim2Letters.includes(ans)) {
          if (ans === 'V') dim2Scores.V++;
          else if (ans === 'S') dim2Scores.S++;
          else dim2Scores.E++;
        }
        if (dim3Letters.includes(ans)) {
          if (ans === 'R') dim3Scores.R++;
          else if (ans === 'E') dim3Scores.E++;
          else dim3Scores.R++;
        }
        if (dim4Letters.includes(ans)) {
          if (ans === 'I') dim4Scores.I++;
          else if (ans === 'G') dim4Scores.G++;
          else dim4Scores.G++;
        }
      } else {
        const roleIdx = i - 10;
        if (roleIdx === 0) {
          if (ans === 'C') { dim1Scores.C += 2; }
          else if (ans === 'D') { dim1Scores.D += 2; }
          else { dim1Scores.C++; dim2Scores.E++; }
        } else if (roleIdx === 1) {
          if (ans === 'C') { dim1Scores.C += 2; dim2Scores.V++; }
          else if (ans === 'V') { dim2Scores.V += 2; }
          else { dim4Scores.G += 2; }
        } else if (roleIdx === 2) {
          if (ans === 'V') { dim2Scores.V += 2; }
          else if (ans === 'D') { dim1Scores.D += 2; }
          else { dim4Scores.I += 2; }
        } else if (roleIdx === 3) {
          if (ans === 'C') { dim1Scores.C += 2; }
          else if (ans === 'D') { dim1Scores.D += 2; }
          else { dim3Scores.R += 2; }
        } else if (roleIdx === 4) {
          if (ans === 'C') { dim1Scores.C += 2; }
          else if (ans === 'E') { dim2Scores.E += 2; dim3Scores.E++; }
          else { dim4Scores.I += 2; }
        }
      }
    });
    
    let type = '';
    type += dim1Scores.C >= dim1Scores.D ? 'C' : 'D';
    type += dim2Scores.V >= dim2Scores.S ? 'V' : 'S';
    type += dim3Scores.R >= dim3Scores.E ? 'R' : 'E';
    type += dim4Scores.I >= dim4Scores.G ? 'I' : 'G';
    
    lastScores = { dim1Scores, dim2Scores, dim3Scores, dim4Scores };
    
    return type;
  }

  function calculateMatch() {
    const myType = document.getElementById('resultType').textContent;
    const otherType = document.getElementById('matchInput').value.toUpperCase().trim();
    
    if (!otherType || otherType.length !== 4 || !personalityTypes[otherType]) {
      alert('请输入正确的人格类型（如CVRI）');
      return;
    }
    
    const key1 = myType + "+" + otherType;
    const key2 = otherType + "+" + myType;
    const ruleKey = matchRules[key1] ? key1 : matchRules[key2] ? key2 : null;
    
    let score, comment;
    
    if (ruleKey) {
      const rule = matchRules[ruleKey];
      score = rule.score;
      comment = rule.comment;
    } else {
      const myD1 = myType[0];
      const otherD1 = otherType[0];
      
      score = 50;
      if (myD1 === otherD1) score += 20;
      else if ((myD1 === 'C' && otherD1 === 'D') || (myD1 === 'D' && otherD1 === 'C')) score += 10;
      
      if (myType[1] === otherType[1]) score += 15;
      if (myType[2] === otherType[2]) score += 10;
      if (myType[3] === otherType[3]) score += 15;
      
      const defaultComments = [
        "两个陌生人，两个世界，各凭本事！",
        "能做完就不错了，要什么自行车？",
        "中将就着用吧，dddd！",
        "别想太多，干就完了！",
        "平平淡淡，过完就好！"
      ];
      comment = defaultComments[Math.floor(Math.random() * defaultComments.length)];
    }
    
    score = Math.min(100, Math.max(0, score));
    
    let s;
    if (score >= 85) s = 'perfect';
    else if (score >= 70) s = 'good';
    else if (score >= 50) s = 'normal';
    else s = 'bad';
    
    const colors = { perfect: '#4CAF50', good: '#8BC34A', normal: '#FFC107', bad: '#FF9800' };
    const labels = { perfect: '天作之合', good: '还不错', normal: '中将就', bad: '有点悬' };
    
    let html = `<div class="match-result show"><div class="match-score" style="color:${colors[s]}">${score}%</div><div class="match-label">${labels[s]}</div><div class="match-comment">${comment}</div></div>`;
    
    document.getElementById('matchResult').innerHTML = html;
    document.getElementById('matchResult').classList.add('show');
  }

    document.getElementById('modalTitle').textContent = '维度得分详情';
